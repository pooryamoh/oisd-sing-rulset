name: Build sing-box OISD Rulesets

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install sing-box CLI
        run: |
          LATEST_URL=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.assets[] | select(.name | test("linux-amd64.tar.gz$")) | .browser_download_url')
          echo "Downloading sing-box from $LATEST_URL"
          curl -sL "$LATEST_URL" | tar -xz
          sudo cp sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Fetch and Compile OISD Lists
        run: |
          # Define the lists you want to pull from OISD
          LISTS=("nsfw" "big")
          
          for LIST in "${LISTS[@]}"; do
            echo "========================================"
            echo "Processing OISD $LIST list..."
            
            # 1. Fetch the specific list
            # 2. Clean comments, AdBlock syntax, and whitespace
            curl -sL "https://$LIST.oisd.nl/" > \
              "oisd-$LIST.text"
              
            echo "Compiling TXT to binary SRS format..."
            sing-box rule-set convert --type adguard --output "oisd-$LIST.srs" "oisd-$LIST.text"
            # Clean up the temp text file before the next loop iteration
            rm "oisd-$LIST.text"
          done

      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "latest"
          name: "Latest OISD Rulesets"
          body: "Automated daily build of the OISD NSFW and BIG lists for sing-box."
          make_latest: true
          files: |
            oisd-nsfw.srs
            oisd-big.srs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
